<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FORM & FIX | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="nike-theme">

    <section id="onboarding" class="screen active">
        <div class="main-content custom-scroll-bar">
            <h1 class="hero-title gradient-text">FORM<br>FIX</h1>
            
            <div class="nike-card">
                <div class="input-grid">
                    <div class="stat-card">
                        <label>AGE</label>
                        <input type="number" id="age" placeholder="48">
                    </div>
                    <div class="stat-card">
                        <label>KG</label>
                        <input type="number" id="weight" placeholder="56">
                    </div>
                </div>

                <div class="input-grid">
                    <div class="stat-card">
                        <label>LEVEL</label>
                        <select id="user-level" class="modern-select">
                            <option value="beginner">BEGINNER</option>
                            <option value="pro">PRO ELITE</option>
                        </select>
                    </div>
                    <div class="stat-card">
                        <label>TIME</label>
                        <select id="user-duration" class="modern-select">
                            <option value="10">10 MIN</option>
                            <option value="20">20 MIN</option>
                            <option value="30">30 MIN</option>
                        </select>
                    </div>
                </div>

                <div class="n-selector">
                    <label class="section-label">PROGRAM CATEGORY</label>
                    <div class="program-stack">
                        <input type="radio" name="goal" value="physio" id="physio" checked>
                        <label for="physio" class="program-btn">🧘 PHYSIO</label>
                        
                        <input type="radio" name="goal" value="office" id="office">
                        <label for="office" class="program-btn">💻 OFFICE</label>

                        <input type="radio" name="goal" value="strength" id="strength">
                        <label for="strength" class="program-btn">⚡ STRENGTH</label>

                        <input type="radio" name="goal" value="yoga" id="yoga">
                        <label for="yoga" class="program-btn">☯ YOGA</label>

                        <input type="radio" name="goal" value="stretch" id="stretch">
                        <label for="stretch" class="program-btn">↔ STRETCH</label>

                        <input type="radio" name="goal" value="pilates" id="pilates">
                        <label for="pilates" class="program-btn">⭕ PILATES</label>
                    </div>
                </div>

                <button id="main-start-btn" class="nike-btn-grad">START SESSION</button>
            </div>
        </div>
    </section>

    <section id="workout-hub" class="screen">
        <div class="hub-nav">
            <button class="back-minimal" onclick="location.reload()">←</button>
            <span class="day-indicator gradient-text">DAILY MOBILITY</span>
        </div>
        <div id="exercise-list-ul" class="nike-list custom-scroll-bar"></div>
        <div class="fixed-bottom">
            <button id="start-workout-btn" class="nike-btn-grad pill">START ALL</button>
        </div>
    </section>

    <section id="dashboard" class="screen">
        <div class="dash-top">
            <div id="exercise-timer" class="gradient-text">02:00</div>
            <button class="back-minimal" onclick="location.reload()">✕</button>
        </div>
        <div class="stage">
            <div id="video-container"></div>
            <h2 id="current-ex-name" class="gradient-text">READY</h2>
        </div>
        <div class="dash-bottom">
            <div class="n-progress-bar"><div id="progress-fill" class="gradient-bg"></div></div>
            <div class="dash-controls">
                <button id="play-pause-btn" class="ctrl-btn main">PAUSE</button>
                <button id="skip-btn" class="ctrl-btn">SKIP</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
