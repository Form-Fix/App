<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM & FIX | Trening</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="onboarding" class="screen">
        <div class="form-card">
            <h1>FORM <span>& FIX</span></h1>
            <form id="user-form">
                <div class="form-row">
                    <input type="number" id="age" placeholder="God" required>
                    <input type="number" id="weight" placeholder="kg" required>
                    <input type="number" id="height" placeholder="cm" required>
                </div>
                <select id="goal">
                    <option value="physio">Fizijatrijski oporavak</option>
                    <option value="strength">Snaga</option>
                </select>
                <select id="duration">
                    <option value="5">5 Minuta (Test)</option>
                    <option value="20">20 Minuta</option>
                </select>
                <button type="submit">PRIPREMI VJEŽBE</button>
            </form>
        </div>
    </div>

    <div id="workout-list-screen" class="screen" style="display: none;">
        <div class="list-card">
            <h2>Tvoj Plan Treninga</h2>
            <ul id="exercise-list-ul"></ul>
            <button id="start-workout-btn">ZAPOČNI SVE REDOM</button>
        </div>
    </div>

    <div id="dashboard" class="screen" style="display: none;">
        <header class="dash-nav">
            <div class="logo-small">FORM <span>& FIX</span></div>
            <div class="timers">
                <div id="total-timer">Ukupno: 20:00</div>
                <div id="exercise-timer">00:45</div>
            </div>
        </header>
        <main class="exercise-display">
            <div class="rive-placeholder">
                <div class="character-circle">
                    <canvas id="rive-canvas"></canvas>
                </div>
                <h2 id="current-ex-name">Naziv vježbe</h2>
            </div>
            <div class="controls">
                <button id="play-pause-btn" class="btn-main">PAUZA</button>
                <button id="skip-btn" class="btn-side">PRESKOČI →</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
