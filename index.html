<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FORM & FIX | Elite</title>
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="nike-theme">

    <section id="onboarding" class="screen active">
        <div class="main-content">
            <h1 class="hero-title gradient-text">FORM<br>FIX</h1>
            
            <div class="nike-card">
                <div class="modern-input-group">
                    <div class="m-field">
                        <span>AGE</span>
                        <input type="number" id="age" placeholder="00">
                    </div>
                    <div class="m-divider"></div>
                    <div class="m-field">
                        <span>KG</span>
                        <input type="number" id="weight" placeholder="00">
                    </div>
                </div>

                <div class="n-selector">
                    <label class="section-label">SELECT PROGRAM</label>
                    <div class="category-stack">
                        <input type="radio" name="goal" value="physio" id="physio" checked>
                        <label for="physio" class="cat-card-wide">
                            <span class="emoji">🧘</span>
                            <span class="text">PHYSIO RECOVERY</span>
                        </label>
                        
                        <input type="radio" name="goal" value="office" id="office">
                        <label for="office" class="cat-card-wide">
                            <span class="emoji">💻</span>
                            <span class="text">OFFICE RELIEF</span>
                        </label>

                        <input type="radio" name="goal" value="strength" id="strength">
                        <label for="strength" class="cat-card-wide">
                            <span class="emoji">⚡</span>
                            <span class="text">ELITE STRENGTH</span>
                        </label>
                    </div>
                </div>

                <button id="generate-btn" class="nike-btn-grad">GENERATE SESSION</button>
            </div>
        </div>
    </section>

    <section id="workout-hub" class="screen">
        <div class="hub-nav">
            <button class="back-btn-glass" onclick="location.reload()">← BACK</button>
        </div>
        <div class="hub-hero">
            <h2 id="hub-title" class="gradient-text">LINEUP</h2>
            <div class="hub-meta"><span id="hub-count">0</span> EXERCISES</div>
        </div>
        <div id="exercise-list-ul" class="nike-list v-scroll"></div>
        <div class="fixed-bottom"><button id="start-workout-btn" class="nike-btn-grad pill">START ALL</button></div>
    </section>

    <section id="dashboard" class="screen">
        <div class="dash-top">
            <div id="exercise-timer" class="gradient-text">00:00</div>
            <button class="back-btn-glass circle" onclick="location.reload()">✕</button>
        </div>
        <div class="stage">
            <canvas id="canvas"></canvas>
            <h2 id="current-ex-name" class="gradient-text">READY</h2>
        </div>
        <div class="dash-bottom">
            <div class="n-progress-bar"><div id="progress-fill" class="gradient-bg"></div></div>
            <div class="dash-controls">
                <button id="play-pause-btn" class="control-btn main">PAUSE</button>
                <button id="skip-btn" class="control-btn">NEXT</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
