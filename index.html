<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM & FIX | Pro Workout</title>
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="onboarding" class="screen">
        <div class="form-card">
            <h1>FORM <span>& FIX</span></h1>
            <form id="user-form">
                <div class="form-row">
                    <input type="number" id="age" placeholder="God" required>
                    <input type="number" id="weight" placeholder="kg" required>
                    <input type="number" id="height" placeholder="cm" required>
                </div>
                <select id="goal" required>
                    <option value="physio">Fizijatrijski oporavak</option>
                    <option value="strength">Funkcionalna snaga</option>
                </select>
                <select id="duration" required>
                    <option value="5">5 Minuta</option>
                    <option value="20">20 Minuta</option>
                </select>
                <button type="submit">PRIPREMI PROGRAM</button>
            </form>
        </div>
    </div>

    <div id="workout-list-screen" class="screen" style="display: none;">
        <div class="list-card">
            <div class="list-header">
                <h2>Tvoj Plan Treninga</h2>
                <span id="list-total-time">10 min</span>
            </div>
            <ul id="exercise-list-ul"></ul>
            <button id="start-workout-btn">ZAPOČNI TRENING</button>
        </div>
    </div>

    <div id="dashboard" class="screen" style="display: none;">
        <div class="progress-global-bar"><div id="global-progress-fill"></div></div>
        
        <header class="dash-nav">
            <div class="nav-left">
                <span id="current-index-display">1 / 10</span>
                <h3 id="current-ex-name">Mačka-Krava</h3>
            </div>
            <div id="exercise-timer">00:45</div>
        </header>

        <main class="workout-main">
            <div class="canvas-container">
                <canvas id="canvas"></canvas> </div>
            
            <div class="ui-overlay">
                <div class="next-up">Sledeće: <span id="next-ex-name">-</span></div>
            </div>
        </main>

        <footer class="controls-footer">
            <button id="play-pause-btn" class="ctrl-btn main">PAUZA</button>
            <button id="skip-btn" class="ctrl-btn secondary">SLEDEĆA →</button>
        </footer>
    </div>

    <audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
</body>
</html>
