<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FORM & FIX | Elite</title>
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="nike-theme">

    <section id="onboarding" class="screen active">
        <div class="main-content">
            <h1 class="hero-title gradient-text">FORM<br>FIX</h1>
            
            <form id="user-form" class="nike-card">
                <div class="input-row">
                    <div class="n-field">
                        <label>AGE</label>
                        <input type="number" id="age" placeholder="--">
                    </div>
                    <div class="n-field">
                        <label>KG</label>
                        <input type="number" id="weight" placeholder="--">
                    </div>
                </div>

                <div class="n-selector">
                    <label>SELECT PROGRAM</label>
                    <div class="category-grid">
                        <input type="radio" name="goal" value="physio" id="physio" checked>
                        <label for="physio" class="cat-card"><span>🧘</span>PHYSIO</label>
                        
                        <input type="radio" name="goal" value="office" id="office">
                        <label for="office" class="cat-card"><span>💻</span>OFFICE</label>

                        <input type="radio" name="goal" value="strength" id="strength">
                        <label for="strength" class="cat-card"><span>⚡</span>STRENGTH</label>

                        <input type="radio" name="goal" value="yoga" id="yoga">
                        <label for="yoga" class="cat-card"><span>☯</span>YOGA</label>

                        <input type="radio" name="goal" value="stretch" id="stretch">
                        <label for="stretch" class="cat-card"><span>↔</span>STRETCH</label>

                        <input type="radio" name="goal" value="pilates" id="pilates">
                        <label for="pilates" class="cat-card"><span>⭕</span>PILATES</label>
                    </div>
                </div>

                <button type="submit" class="nike-btn-grad">GENERATE SESSION</button>
            </form>
        </div>
    </section>

    <section id="workout-hub" class="screen">
        <div class="hub-nav">
            <button class="back-btn-glass" onclick="location.reload()">← BACK</button>
            <span class="logo-small gradient-text">ELITE PLAN</span>
        </div>
        <div class="hub-hero">
            <h2 id="hub-title" class="gradient-text">TODAY'S<br>LINEUP</h2>
            <div class="hub-meta"><span id="hub-count">0 EX</span> • <span id="hub-time">0 MIN</span></div>
        </div>
        <div id="exercise-list-ul" class="nike-list v-scroll"></div>
        <div class="fixed-bottom"><button id="start-workout-btn" class="nike-btn-grad pill">START TRAINING</button></div>
    </section>

    <section id="dashboard" class="screen">
        <div class="dash-top">
            <div id="exercise-timer" class="gradient-text">00:00</div>
            <button class="back-btn-glass circle" onclick="location.reload()">✕</button>
        </div>
        <div class="stage">
            <canvas id="canvas"></canvas>
            <h2 id="current-ex-name" class="gradient-text">READY</h2>
        </div>
        <div class="dash-bottom">
            <div class="n-progress-bar"><div id="progress-fill" class="gradient-bg"></div></div>
            <div class="dash-controls">
                <button id="play-pause-btn" class="n-circle-btn">PAUSE</button>
                <button id="skip-btn" class="n-next-btn">NEXT →</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
