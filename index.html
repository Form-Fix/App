<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORM & FIX PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<section id="onboarding" class="screen active">
<div class="main-content">

<h1 class="hero-title gradient-text">FORM<br>FIX</h1>

<div class="nike-card">

<div class="input-grid">
<div class="stat-card">
<label>AGE</label>
<select id="age" class="modern-select"></select>
</div>

<div class="stat-card">
<label>KG</label>
<select id="weight" class="modern-select"></select>
</div>
</div>

<div class="input-grid">
<div class="stat-card">
<label>LEVEL</label>
<select id="user-level" class="modern-select">
<option value="beginner">BEGINNER</option>
<option value="intermediate">INTERMEDIATE</option>
<option value="pro">PRO</option>
</select>
</div>

<div class="stat-card">
<label>TIME</label>
<select id="user-duration" class="modern-select">
<option value="10">10 MIN</option>
<option value="20">20 MIN</option>
<option value="30">30 MIN</option>
<option value="45">45 MIN</option>
</select>
</div>
</div>

<div class="program-stack">
<input type="radio" name="goal" value="strength" id="strength" checked>
<label for="strength" class="program-btn">⚡ STRENGTH</label>

<input type="radio" name="goal" value="mobility" id="mobility">
<label for="mobility" class="program-btn">🧘 MOBILITY</label>

<input type="radio" name="goal" value="yoga" id="yoga">
<label for="yoga" class="program-btn">☯ YOGA</label>
</div>

<button id="main-start-btn" class="nike-btn-grad">GENERATE PLAN</button>

</div>

<div id="weekly-plan"></div>

</div>
</section>

<section id="workout-hub" class="screen">
<button class="back-minimal" onclick="location.reload()">←</button>
<div id="exercise-list-ul"></div>
<button id="start-workout-btn" class="nike-btn-grad">START ALL</button>
</section>

<section id="dashboard" class="screen">
<div id="stats-box"></div>
<div id="exercise-timer" class="gradient-text">00</div>
<h2 id="current-ex-name"></h2>

<div class="n-progress-bar">
<div id="progress-fill" class="gradient-bg"></div>
</div>

<button id="play-pause-btn" class="ctrl-btn main">PAUSE</button>
<button id="skip-btn" class="ctrl-btn">SKIP</button>
</section>

<script src="script.js"></script>
</body>
</html>
