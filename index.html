<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM & FIX | Elite Personal Trainer</title>
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="onboarding" class="screen">
        <div class="hero-bg"></div>
        <div class="content">
            <h1 class="logo-text">FORM<span>&FIX</span></h1>
            <p class="tagline">Physio-led precision training.</p>
            
            <form id="user-form" class="glass-card">
                <div class="input-group">
                    <input type="number" id="age" placeholder="Age" required>
                    <input type="number" id="weight" placeholder="Weight (kg)" required>
                </div>
                
                <label>Select Your Focus</label>
                <div class="goal-grid">
                    <input type="radio" name="goal" value="physio" id="g1" checked>
                    <label for="g1" class="goal-item"><span>🧘</span>Recovery</label>
                    
                    <input type="radio" name="goal" value="strength" id="g2">
                    <label for="g2" class="goal-item"><span>⚡</span>Strength</label>
                </div>

                <select id="duration">
                    <option value="15">15 Minutes Session</option>
                    <option value="30">30 Minutes Session</option>
                    <option value="45">45 Minutes Session</option>
                </select>

                <button type="submit" class="btn-primary">CREATE MY PLAN</button>
            </form>
        </div>
    </section>

    <section id="workout-hub" class="screen" style="display: none;">
        <div class="header-hub">
            <h2>Today's <span>Program</span></h2>
            <p id="program-type">Physio Mobility Alpha</p>
        </div>
        
        <div class="workout-list" id="exercise-list-ul">
            </div>

        <div class="footer-action">
            <button id="start-workout-btn" class="btn-float">START SESSION</button>
        </div>
    </section>

    <section id="dashboard" class="screen" style="display: none;">
        <div class="top-bar">
            <button class="btn-exit" onclick="location.reload()">✕</button>
            <div class="session-info">
                <span id="current-ex-index">1/12</span>
                <p id="current-ex-name">Cat-Cow Stretch</p>
            </div>
            <div id="exercise-timer">00:45</div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas> </div>

        <div class="bottom-controls">
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
            <div class="control-btns">
                <button id="play-pause-btn">PAUSE</button>
                <button id="skip-btn">SKIP →</button>
            </div>
            <div class="next-up">Next: <span id="next-ex-name">Dead Bug</span></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
