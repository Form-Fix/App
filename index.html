<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FormFix Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="home-screen" class="screen active">
    <h1 class="hero-title gradient-text">FORM<br>FIX</h1>
    <div class="nike-card">
        <div class="input-grid">
            <div class="stat-card">
                <label>AGE</label>
                <div class="number-input">
                    <button type="button" class="num-btn" data-target="age" data-step="-1">−</button>
                    <input type="number" id="age" value="25" readonly>
                    <button type="button" class="num-btn" data-target="age" data-step="1">+</button>
                </div>
            </div>
            <div class="stat-card">
                <label>WEIGHT (KG)</label>
                <div class="number-input">
                    <button type="button" class="num-btn" data-target="weight" data-step="-1">−</button>
                    <input type="number" id="weight" value="70" readonly>
                    <button type="button" class="num-btn" data-target="weight" data-step="1">+</button>
                </div>
            </div>
            <div class="stat-card">
                <label>LEVEL</label>
                <div class="number-input">
                    <button type="button" class="num-btn" data-target="user-level" data-step="-1" data-type="list">−</button>
                    <input type="text" id="user-level" value="BEGINNER" readonly>
                    <button type="button" class="num-btn" data-target="user-level" data-step="1" data-type="list">+</button>
                </div>
            </div>
            <div class="stat-card">
                <label>DURATION</label>
                <div class="number-input">
                    <button type="button" class="num-btn" data-target="user-duration" data-step="-5">−</button>
                    <input type="number" id="user-duration" value="20" readonly>
                    <button type="button" class="num-btn" data-target="user-duration" data-step="5">+</button>
                </div>
            </div>
        </div>

        <div class="goal-selector">
            <label class="program-btn"><input type="radio" name="goal" value="menopause"> 🌸 Menopause Strength</label>
            <label class="program-btn"><input type="radio" name="goal" value="weightloss"> 🔥 Fat Burn Focus</label>
            <label class="program-btn"><input type="radio" name="goal" value="joints"> 🦴 Joint Mobility</label>
            <label class="program-btn"><input type="radio" name="goal" value="physio"> 🩹 Rehab / Back Care</label>
            <label class="program-btn"><input type="radio" name="goal" value="office"> 💻 Office Recovery</label>
        </div>
        <button id="main-start-btn" class="nike-btn-grad">Generate Plan</button>
    </div>
</section>

<section id="plan-screen" class="screen">
    <button onclick="switchScreen('home-screen')" class="back-btn">← GO BACK</button>
    <h2 class="gradient-text">WEEKLY<br>PLAN</h2>
    <div id="weekly-plan-list"></div>
</section>

<section id="workout-hub" class="screen">
    <button onclick="switchScreen('plan-screen')" class="back-btn">← BACK TO PLAN</button>
    <div id="exercise-list-ul"></div>
    <button id="start-workout-btn" class="nike-btn-grad" style="margin-top:20px;">START ALL</button>
</section>

<section id="dashboard" class="screen">
    <button id="exit-workout-btn" class="back-btn">✕ EXIT</button>
    <div id="exercise-timer" class="gradient-text">00:00</div>
    <div class="video-container">
        <iframe id="youtube-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <h2 id="current-ex-name" style="text-align:center; font-weight:900;"></h2>
    <div class="n-progress-bar"><div id="progress-fill"></div></div>
    <div class="controls-row" style="display: grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <button id="play-pause-btn" class="num-btn" style="width:100%; height:60px;">PAUSE</button>
        <button id="skip-btn" class="num-btn" style="width:100%; height:60px; background:var(--p-pink)">SKIP ➔</button>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
